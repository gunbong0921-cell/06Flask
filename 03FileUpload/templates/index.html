<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>파일 업로드</title>
</head>
<body>
  <h1>파일 업로드</h1>  
  <form action="{{ url_for('upload_file') }}" method="post"

    <button type="submit">업로드</button>
  </form>

  <p><a href="{{ url_for('file_list') }}">📂 파일 목록 보기</a></p>
</body>
</html>
